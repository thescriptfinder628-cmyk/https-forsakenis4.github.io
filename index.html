<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashlight App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="app-container">
        <h1>Polished Flashlight App</h1>
        <div class="color-modes">
            <button data-color="white" class="color-button">White</button>
            <button data-color="red" class="color-button">Red</button>
            <button data-color="blue" class="color-button">Blue</button>
            <button data-color="green" class="color-button">Green</button>
            <button data-color="strobe" class="color-button">Strobe Effect</button>
        </div>
        <button class="dark-mode-toggle">Toggle Dark Mode</button>
        <div class="flashlight" id="flashlight">
            <p>Flashlight is OFF</p>
        </div>
    </div>
</body>
</html>
