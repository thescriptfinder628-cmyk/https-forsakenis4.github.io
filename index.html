<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flashlight</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#fff}

/* white screen layer */
#white{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .2s;z-index:0}

/* MAIN UI */
.ui{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;padding:40px;transition:opacity .2s}
body.ON .ui{opacity:0;pointer-events:none}

title{font-size:11px;font-weight:700;letter-spacing:6px;color:#1e1e2c;text-transform:uppercase}

/* BUTTON */
.btnWrap{position:relative;display:flex;align-items:center;justify-content:center}
.halo{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.04)}
.h1{width:228px;height:228px}.h2{width:290px;height:290px}.h3{width:352px;height:352px}

#btn{
  width:172px;height:172px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%,#27273c,#101018);
  border:1.5px solid #26263a;
  box-shadow:0 0 0 10px #0f0f18,0 0 0 12px #191928,0 32px 72px rgba(0,0,0,.92),inset 0 1.5px 0 rgba(255,255,255,.07);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  position:relative;overflow:hidden;transition:transform .1s ease;
}
#btn::before{content:'';position:absolute;top:10%;left:14%;width:36%;height:26%;background:linear-gradient(135deg,rgba(255,255,255,.09),transparent);border-radius:50%;pointer-events:none}
#btn:active{transform:scale(.9)}

svg.ico{width:52px;height:52px}
#ring{fill:none;stroke:#252538;stroke-width:3;stroke-linecap:round;stroke-dasharray:210;stroke-dashoffset:52;transition:stroke .25s,filter .25s}
#stem{stroke:#252538;stroke-width:3;stroke-linecap:round;transition:stroke .25s,filter .25s}
.btnLbl{font-size:9px;font-weight:700;letter-spacing:4px;color:#252538;text-transform:uppercase;transition:color .25s}

/* SLIDER */
.sldr{width:76%;display:flex;flex-direction:column;align-items:center;gap:10px}
.sldrLbl{font-size:9px;letter-spacing:3px;color:#1a1a28;text-transform:uppercase}
.sldrRow{width:100%;display:flex;align-items:center;gap:12px}
.si{font-size:14px;opacity:.2}.si.lg{font-size:20px;opacity:.35}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:5px;background:#181826;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#22223a;border:2px solid #30304e;cursor:pointer}

/* STATUS */
.status{display:flex;align-items:center;gap:10px;background:#111118;border:1px solid #1c1c28;border-radius:30px;padding:12px 28px}
.dot{width:9px;height:9px;border-radius:50%;background:#1a1a26;transition:background .25s,box-shadow .25s}
.stxt{font-size:12px;font-weight:500;letter-spacing:3px;color:#22222e;transition:color .25s}

/* INFO MESSAGE */
#info{font-size:10px;color:#1e1e2e;letter-spacing:1px;text-align:center;line-height:1.7;max-width:260px}

/* WHEN ON OVERLAY */
#onLayer{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:52px;opacity:0;pointer-events:none;transition:opacity .2s}
body.ON #onLayer{opacity:1;pointer-events:all}
#tapOff{position:absolute;inset:0;cursor:pointer}
.onCard{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px}
.pill{background:rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.12);border-radius:44px;padding:14px 30px;display:flex;flex-direction:column;align-items:center;gap:9px;backdrop-filter:blur(16px)}
.pillLbl{font-size:9px;letter-spacing:3px;color:rgba(0,0,0,.35);text-transform:uppercase}
.pillRow{width:100%;display:flex;align-items:center;gap:10px}
.pi{font-size:13px;color:rgba(0,0,0,.22)}.pi.lg{font-size:18px}
input#bOn{flex:1;-webkit-appearance:none;appearance:none;height:5px;background:rgba(0,0,0,.15);border-radius:3px;outline:none}
input#bOn::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.22);border:2px solid rgba(0,0,0,.3);cursor:pointer}
.offBtn{background:rgba(0,0,0,.12);border:1.5px solid rgba(0,0,0,.15);border-radius:50px;padding:15px 52px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;color:rgba(0,0,0,.4);cursor:pointer;transition:background .1s}
.offBtn:active{background:rgba(0,0,0,.22)}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(14px);background:#131320;border:1px solid #20203a;border-radius:12px;padding:10px 20px;font-size:10px;letter-spacing:1px;opacity:0;transition:opacity .2s,transform .2s;z-index:10}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="white"></div>
<div id="toast"></div>

<!-- OFF UI -->
<div class="ui">
  <div class="title">Flashlight</div>

  <div class="btnWrap">
    <div class="halo h3"></div>
    <div class="halo h2"></div>
    <div class="halo h1"></div>
    <div id="btn" onclick="toggle()">
      <svg class="ico" viewBox="0 0 52 52">
        <line id="stem" x1="26" y1="4" x2="26" y2="22"/>
        <circle id="ring" cx="26" cy="28" r="16" transform="rotate(-90,26,28)"/>
      </svg>
      <div class="btnLbl" id="btnLbl">START</div>
    </div>
  </div>

  <div class="sldr">
    <div class="sldrLbl">Screen Brightness</div>
    <div class="sldrRow">
      <span class="si">☀</span>
      <input type="range" id="bOff" min="10" max="100" value="100" oninput="setBright(+this.value)">
      <span class="si lg">☀</span>
    </div>
  </div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <div class="stxt" id="stxt">OFF</div>
  </div>

  <div id="info">Tap the button — Chrome will ask for camera permission.<br>Allow it → real flash will turn on.</div>
</div>

<!-- WHEN ON -->
<div id="onLayer">
  <div id="tapOff" onclick="toggle()"></div>
  <div class="onCard" onclick="event.stopPropagation()">
    <div class="pill">
      <div class="pillLbl">Screen Brightness</div>
      <div class="pillRow">
        <span class="pi">☀</span>
        <input type="range" id="bOn" min="10" max="100" value="100" oninput="setBright(+this.value)">
        <span class="pi lg">☀</span>
      </div>
    </div>
    <button class="offBtn" onclick="toggle()">■ TURN OFF</button>
  </div>
</div>

<script>
let isOn = false;
let torchTrack = null;
let hasTorch = false;
let bright = 100;
let wakeLock = null;

const white  = document.getElementById('white');
const ring   = document.getElementById('ring');
const stem   = document.getElementById('stem');
const btnLbl = document.getElementById('btnLbl');
const dot    = document.getElementById('dot');
const stxt   = document.getElementById('stxt');
const info   = document.getElementById('info');
const toast  = document.getElementById('toast');

function setBright(v) {
  bright = v;
  document.getElementById('bOff').value = v;
  document.getElementById('bOn').value = v;
  if (isOn) white.style.opacity = (v / 100).toFixed(2);
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 3500);
}

async function toggle() {
  if (!isOn) await turnOn();
  else await turnOff();
}

async function turnOn() {
  isOn = true;

  // Real flash — works on HTTPS, Chrome asks for permission
  if (!torchTrack) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      const track = stream.getVideoTracks()[0];
      const caps = track.getCapabilities ? track.getCapabilities() : {};

      if (caps.torch) {
        torchTrack = track;
        hasTorch = true;
        await torchTrack.applyConstraints({ advanced: [{ torch: true }] });
        showToast('🔦 Real flashlight on!');
        info.textContent = 'Real flash is active 🔦';
      } else {
        track.stop();
        showToast('Flash hardware not found — screen mode');
        info.textContent = 'Screen flashlight mode 💡';
      }
    } catch(e) {
      if (e.name === 'NotAllowedError') {
        showToast('❌ Camera permission denied');
      } else {
        showToast('❌ Could not open camera: ' + e.message);
      }
    }
  } else if (hasTorch) {
    try { await torchTrack.applyConstraints({ advanced: [{ torch: true }] }); } catch(e) {}
  }

  // Brighten the screen (always)
  document.body.classList.add('ON');
  white.style.opacity = (bright / 100).toFixed(2);

  // Prevent screen from turning off
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}

  setUI(true);
}

async function turnOff() {
  isOn = false;

  if (hasTorch && torchTrack) {
    try { await torchTrack.applyConstraints({ advanced: [{ torch: false }] }); } catch(e) {}
  }

  document.body.classList.remove('ON');
  white.style.opacity = '0';

  if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; }

  setUI(false);
}

function setUI(on) {
  const c = on ? '#00e87a' : '#252538';
  ring.style.stroke = stem.style.stroke = c;
  ring.style.filter = stem.style.filter = on ? 'drop-shadow(0 0 5px #00ff88)' : 'none';
  btnLbl.style.color = c;
  btnLbl.textContent = on ? 'ON' : 'START';
  dot.style.background = on ? '#00ff88' : '#1a1a26';
  dot.style.boxShadow = on ? '0 0 8px #00ff88' : 'none';
  stxt.style.color = on ? '#00aa55' : '#22222e';
  stxt.textContent = on ? 'ON' : 'OFF';
}

// Reopen flash when tab is visible again
document.addEventListener('visibilitychange', async () => {
  if (!document.hidden && isOn) {
    if (hasTorch && torchTrack) {
      try { await torchTrack.applyConstraints({ advanced: [{ torch: true }] }); } catch(e) {}
    }
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }
});
</script>
</body>
</html>
